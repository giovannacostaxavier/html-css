<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 07</title>
    <style>
        input[type="text"],
        input[type="email"] {
            display: block;
            margin-bottom: 10px;
        }

        textarea {
            display: block;
            margin-bottom: 10px;
        }

        header {
            border: 3px solid green;
            background-color: rgb(147, 234, 147);
            padding-left: 10px;
        }

        main {
            border: 1px solid black;
            padding: 10px;
            min-height: 550px;
        }

        section {
            border: 2px solid black;
            padding: 10px;
        }

        h2 {
            color: rgb(180, 0, 0);
        }

        p.subtitulo {
            font-weight: bold;
            font-size: 0.9em;
        }

        label {
            display: inline-block;
            margin-bottom: 4px;
        }

        .linha-campo {
            display: flex;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .linha-campo label {
            width: 140px;
            padding-top: 2px;
        }

        .linha-campo input[type="text"],
        .linha-campo input[type="email"],
        .linha-campo textarea {
            display: block;
            margin-bottom: 0;
        }

        .linha-campo .checkboxes {
            display: flex;
            gap: 12px;
            align-items: center;
            padding-top: 2px;
        }

        button {
            background-color: white;
            color: rgb(180, 0, 0);
            border: 2px solid rgb(180, 0, 0);
            padding: 5px 14px;
            cursor: pointer;
            font-size: 1em;
        }
    </style>
</head>
<body>
    <header>
        <p>Exercício 7 — Rádio Campus</p>
    </header>
    <main>
        <section>
            <h2>Rádio Campus</h2>
            <p class="subtitulo">Fale com a equipa da rádio.</p>

            <form method="POST">
                <div class="linha-campo">
                    <label for="nome">Nome:</label>
                    <input type="text" name="nome" id="nome">
                </div>

                <div class="linha-campo">
                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email">
                </div>

                <div class="linha-campo">
                    <label for="mensagem">Mensagem longa:</label>
                    <textarea name="mensagem" id="mensagem" cols="40" rows="6"></textarea>
                </div>

                <div class="linha-campo">
                    <label>Tema:</label>
                    <div class="checkboxes">
                        <label><input type="checkbox" name="tema" value="musica"> Música</label>
                        <label><input type="checkbox" name="tema" value="noticias"> Notícias</label>
                        <label><input type="checkbox" name="tema" value="eventos"> Eventos</label>
                    </div>
                </div>

                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
</body>
</html>
