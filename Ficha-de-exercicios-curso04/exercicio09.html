<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 09</title>
    <style>
        header {
            border: 3px solid green;
            background-color: rgb(147, 234, 147);
            padding-left: 10px;
        }

        main {
            border: 1px solid black;
            padding: 10px;
            min-height: 550px;
        }

        section {
            border: 2px solid black;
            padding: 20px;
        }

        h2 {
            color: rgb(30, 100, 160);
        }

        .conteudo {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
        }

        .imagem-placeholder {
            width: 200px;
            min-height: 160px;
            background-color: rgb(180, 220, 180);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            text-align: center;
            flex-shrink: 0;
        }

        .info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info p {
            margin: 0 0 6px 0;
        }

        .info ul {
            margin: 0 0 16px 0;
            padding-left: 20px;
            list-style-type: disc;
        }

        .info ul li {
            margin-bottom: 4px;
        }

        .classificacao {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .estrelas {
            display: flex;
            gap: 2px;
        }

        .estrela-cheia {
            width: 16px;
            height: 16px;
            background-color: black;
            border-radius: 50%;
            display: inline-block;
        }

        .estrela-vazia {
            width: 16px;
            height: 16px;
            background-color: white;
            border: 2px solid black;
            border-radius: 50%;
            display: inline-block;
        }

        .linha-campo {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .linha-campo label {
            width: 70px;
        }

        button {
            background-color: white;
            color: rgb(70, 130, 180);
            border: 2px solid rgb(70, 130, 180);
            padding: 4px 14px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <header>
        <p>Exercício 9 — Blog Sabores da Terra</p>
    </header>
    <main>
        <section>
            <h2>Blog Sabores da Terra</h2>

            <div class="conteudo">
                <div class="imagem-placeholder">Imagem da receita</div>
                <div class="info">
                    <p>Receitas da semana:</p>
                    <ul>
                        <li>Sopa de legumes</li>
                        <li>Bolo de laranja</li>
                        <li>Arroz de forno</li>
                    </ul>
                    <div class="classificacao">
                        <span>Classificação:</span>
                        <div class="estrelas">
                            <span class="estrela-cheia"></span>
                            <span class="estrela-cheia"></span>
                            <span class="estrela-cheia"></span>
                            <span class="estrela-cheia"></span>
                            <span class="estrela-vazia"></span>
                        </div>
                    </div>
                </div>
            </div>

            <form method="POST">
                <div class="linha-campo">
                    <label for="nome">Nome:</label>
                    <input type="text" name="nome" id="nome">
                </div>
                <div class="linha-campo">
                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email">
                </div>
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
</body>
</html>
