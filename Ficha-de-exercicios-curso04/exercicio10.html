<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 10</title>
    <style>
        header {
            border: 3px solid green;
            background-color: rgb(147, 234, 147);
            padding-left: 10px;
        }

        main {
            border: 1px solid black;
            padding: 10px;
            min-height: 550px;
        }

        section {
            border: 2px solid black;
            padding: 20px;
        }

        h2 {
            color: rgb(130, 0, 80);
        }

        .linha-campo {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .linha-campo label {
            width: 110px;
        }

        .linha-campo .checkboxes {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button {
            background-color: rgb(200, 190, 230);
            color: black;
            border: 2px solid rgb(160, 140, 200);
            padding: 5px 14px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <p>Exercício 10 — Loja Desporto Top</p>
    </header>
    <main>
        <section>
            <h2>Loja Desporto Top</h2>
            <p>Escolha o seu equipamento ideal.</p>

            <form method="POST">
                <div class="linha-campo">
                    <label for="nome">Nome:</label>
                    <input type="text" name="nome" id="nome">
                </div>
                <div class="linha-campo">
                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email">
                </div>
                <div class="linha-campo">
                    <label for="tamanho">Tamanho:</label>
                    <input type="text" name="tamanho" id="tamanho" size="12">
                </div>
                <div class="linha-campo">
                    <label for="cor">Cor:</label>
                    <input type="text" name="cor" id="cor" size="6">
                </div>
                <div class="linha-campo">
                    <label>Preferências:</label>
                    <div class="checkboxes">
                        <label><input type="checkbox" name="pref" value="corrida"> Corrida</label>
                        <label><input type="checkbox" name="pref" value="ginasio"> Ginásio</label>
                        <label><input type="checkbox" name="pref" value="futebol"> Futebol</label>
                    </div>
                </div>
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
</body>
</html>
