<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens dinamicas</title>
</head>
<body>
 <h1>Vamos agora fazer imagens que se adaptam em qualquer dispositivo!</h1>  
 <picture>
    <source media="(max-width:750px)" srcset="img/img-p.png" type="image/png">
    <source media="(max-width:1050px)" srcset="img/img-m.png" type="image/png">
    <img src="img/img-g.png" alt="imagem adaptável">
 </picture> 
</body>
</html>
