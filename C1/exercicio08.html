<head>

    <style>
        input{
           
            margin-bottom: 10px;
            background-color: rgb(172, 202, 219); 
           
        }
      
        header{
            border: 3px solid black;
            background-color: rgb(172, 219, 172); 
            padding: 10px;
           
        }
        main{
            border: 1px solid black;
            padding: 10px;
            height: 380px;
        
        }
        
        section{
            border: 3px solid blue;
            padding: 10px;

            display: block;
        }
       
        .campo{
            display: flex;
        }
        label{
            width: 80px;
        }
        p{
            display: inline;
        }
        form{
            padding-top: 20px;
        }
       
    </style>
</head>
<body>
    <header>
        <p>Calculadora de pontos do concurso</P>
    </header>
    <main>
        <section>
            <form action="POST" class="container">
                <div class="container">
                    <div class="campo">
                        <label for="nome">Nome:</label>
                        <input type="text" name="nome" id="nome" required>
                    </div>
                    <div class="campo">
                        <label for="email">Email:</label>
                        <input type="email" name="email" id="email" required>
                    </div>
                    <div class="campo">

                    <button type="submit">Enviar</button>
                    
                </div>
            
            </form>
        </section>
