<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 05</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        fieldset {
            display: inline-block;
            padding: 20px;
            border: 1px solid black;
        }
        legend {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .campo {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        label {
            margin-right: 6px;
        }
        textarea {
            resize: vertical;
            width: 200px;
        }
        button {
            margin-top: 10px;
            padding: 4px 10px;
        }
    </style>
</head>
<body>

    <form action="POST">
        <fieldset>
            <legend>Cidades</legend>

            <div class="campo">
                <label for="cidade">Cidade:</label>
                <input type="text" id="cidade" name="cidade" list="sugestoes">
                <datalist id="sugestoes">
                    <option value="Lisboa">
                    <option value="Porto">
                    <option value="Coimbra">
                </datalist>
            </div>

            <div class="campo">
                <label for="comentario">Comentário:</label>
            </div>
            <textarea name="comentario" id="comentario" rows="4"></textarea>

            <br>
            <button type="submit">Enviar</button>
        </fieldset>
    </form>

</body>
</html>
