<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 03</title>
    <style>
        label{
            margin-right: 20px;
            width: 60px;
            margin-top: 20px;
        }
        input{
            margin-top: 20px;
            margin-bottom: 10px;
            background-color: rgb(203, 166, 203);
        }
        header{
            border: 3px solid black;
            background-color: rgb(255, 243, 208);
            padding-left: 10px;
        }
        main{
            border: 1px solid black;
            padding: 10px;
        }
        section{
            border: 3px solid purple;
            padding: 10px;
            background-color: rgb(203, 166, 203);
        }
        form{
            display: flex;
            gap: 40px;
        }
        .campo{
            display: flex;
        }
        button{
            margin-top: 30px;
            border: 3px solid purple;
            padding: 10px;
            background-color: rgb(203, 166, 203);
        }
        h2{
            color: rgb(114, 114, 66);
        }
        .check-grupo div{
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
        }
        .check-grupo label{
            margin: 0;
            width: auto;
        }
        .check-grupo input{
            margin: 0;
        }
    </style>
</head>
<body>
    <header>
        <p>Inscrição no Curso de Arte Digital</p>
    </header>
    <main>
        <section>
            <form action="POST">

                <div class="coluna-esquerda">
                    <h2>Dados pessoais</h2>
                    <div class="campo">
                        <label for="nome">Nome:</label>
                        <input type="text" name="nome" id="nome" required>
                    </div>
                    <div class="campo">
                        <label for="idade">Idade:</label>
                        <input type="number" name="idade" id="idade" required>
                    </div>
                    <div class="campo">
                        <label for="email">Email:</label>
                        <input type="email" name="email" id="email" required>
                    </div>
                    <button type="submit">Enviar</button>
                </div>

                <div class="coluna-direita">
                    <h2>Preferências do curso</h2>
                    <div class="check-grupo">
                        <div>
                            <input type="checkbox" name="ilustracao" id="ilu">
                            <label for="ilu">Ilustração</label>
                        </div>
                        <div>
                            <input type="checkbox" name="fotografia" id="fot">
                            <label for="fot">Fotografia</label>
                        </div>
                        <div>
                            <input type="radio" name="modalidade" id="pre">
                            <label for="pre">Presencial</label>
                        </div>
                        <div>
                            <input type="radio" name="modalidade" id="on">
                            <label for="on">Online</label>
                        </div>
                    </div>
                </div>

            </form>
        </section>
    </main>
</body>
</html>
