<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 11</title>
     <style>
        *{
            margin: 0px;
            padding: 0px;
        }
header{
    border:1px solid black;
    background-color:#efe7bc;
    padding:10px;
}

main{
    border:1px solid gray;
    padding:20px;
    height:300px;
}

section{
    width:470px;
    height:210px;
    margin:auto;
    padding:10px;
    border:1px solid green;
    background-color:#d7e5cf;
    display:flex;
    justify-content:space-around;
}

label{
    display:inline-block;
    width:70px;
}

button{
    margin-top:15px;
}
</style>

</head>
<body>
   
<header>
    <b>Exercício 11 — Ficha de morada e contactos da Família</b>
</header>

<main>
<section>

<div>
<h4>Morada</h4>

<label>Rua:</label>
<input type="text"><br><br>

<label>Cidade:</label>
<input type="text"><br><br>

<label>Código postal:</label>
<input type="text">
</div>

<div>
<h4>Contactos</h4>

<label>Telefone:</label>
<input type="tel"><br><br>

<label>Email:</label>
<input type="email"><br><br>

<label>Website:</label>
<input type="text">
</div>

</section>

<button>Enviar</button>

</main>
</body>
</html>
