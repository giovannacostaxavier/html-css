<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 12</title>

    <style>

        header{
            border:3px solid black;
            background-color:rgb(172, 219, 172);
            padding:10px;
        }

        main{
            border:1px solid black;
            padding:10px;
        }

        fieldset{
            border:3px solid goldenrod;
            background-color:#efe7c5;
            width:470px;
            margin:auto;
            padding:15px;
        }

        .container{
            display:flex;
            flex-wrap:wrap;
            gap:20px;
        }

        .grupo{
            width:45%;
        }

        label{
            display:block;
            margin-bottom:5px;
        }

        input,
        textarea{
            margin-bottom:10px;
            background-color:rgb(172, 202, 219);
        }

        button{
            border:3px solid green;
            padding:10px;
            background-color:rgb(172, 219, 172);
            margin-top:20px;
        }

    </style>

</head>
<body>

<header>
    <p>Dados de inscrição no Workshop Criativo</p>
</header>

<main>

<form>

<fieldset>

<legend>Workshop Criativo</legend>

<div class="container">

    <div class="grupo">
        <h4>Grupo A</h4>

        <label for="nome">Nome:</label>
        <input type="text" id="nome">
    </div>

    <div class="grupo">
        <h4>Grupo B</h4>

        <label for="email">Email:</label>
        <input type="email" id="email">
    </div>

    <div class="grupo">
        <h4>Grupo C</h4>

        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone">
    </div>

    <div class="grupo">
        <h4>Grupo D</h4>

        <label for="obs">Observações:</label>
        <textarea id="obs" rows="3" cols="20"></textarea>
    </div>

</div>

<button type="submit">Enviar</button>

</fieldset>

</form>

</main>

</body>
</html>
