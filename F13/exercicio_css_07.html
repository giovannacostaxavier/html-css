<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Exercício CSS 7 — Classes e identificadores (id)</title>
    <style>
        .aviso {
            color: rgb(200, 100, 0);
            font-weight: bold;
        }

        #importante {
            background-color: rgb(255, 240, 100);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <p class="aviso">Atenção: entrega do trabalho esta sexta-feira.</p>
    <p class="aviso">Atenção: traz o cartão de identificação.</p>
    <p id="importante">Este aviso é diferente de todos os outros.</p>
</body>
</html>
