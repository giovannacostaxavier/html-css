<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Exercício CSS 5 — Estilos de borda</title>
    <style>
        .caixa {
            display: inline-block;
            width: 90px;
            padding: 10px;
            background-color: white;
            border-width: 3px;
            border-color: rgb(30, 90, 180);
            margin: 10px;
            text-align: center;
        }

        .solid  { border-style: solid; }
        .dashed { border-style: dashed; }
        .dotted { border-style: dotted; }
        .double { border-style: double; }
        .groove { border-style: groove; }
        .ridge  { border-style: ridge; }
    </style>
</head>
<body>
    <div class="caixa solid">solid</div>
    <div class="caixa dashed">dashed</div>
    <div class="caixa dotted">dotted</div>
    <div class="caixa double">double</div>
    <div class="caixa groove">groove</div>
    <div class="caixa ridge">ridge</div>
</body>
</html>
