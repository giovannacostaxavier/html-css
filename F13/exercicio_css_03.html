<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Exercício CSS 3 — Alinhamento e decoração de texto</title>
    <style>
        h2 {
            text-align: center;
            text-decoration: underline;
            color: rgb(180, 80, 0);
        }

        p {
            text-align: justify;
            line-height: 2;
        }
    </style>
</head>
<body>
    <h2>Aviso Importante</h2>
    <p>Lê este aviso com atenção antes de continuares para a próxima página.</p>
</body>
</html>
