<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 09</title>
     <style>
header{
    border:1px solid black;
    background-color:#e9d5b7;
    padding:10px;
}

main{
    border:1px solid gray;
    padding:20px;
    height:300px;
}

section{
    width:470px;
    height:170px;
    margin:auto;
    padding:15px;
    border:1px solid teal;
    background-color:#cfe0e2;
}

label{
    display:inline-block;
    width:80px;
}

textarea{
    vertical-align:top;
}

button{
    margin-top:10px;
}
</style>
</head>
<body>
   

<header>
    <b>Exercício 9 — Mensagem para a Biblioteca Municipal</b>
</header>

<main>
<section>
    <h4>Mensagem longa</h4>

    <label for="assunto">Assunto:</label>
    <input type="text" id="assunto">
    <br><br>

    <label for="mensagem">Mensagem:</label>
    <textarea id="mensagem" rows="4" cols="25"></textarea>
    <br><br>

    <button>Enviar</button>
</section>
</main>
</body>
</html>
