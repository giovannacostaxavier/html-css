<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 10</title>

    <style>

        header{
            border: 3px solid black;
            background-color: rgb(172, 219, 172);
            padding: 10px;
        }

        main{
            border: 1px solid black;
            padding: 10px;
        }

        section{
            border: 3px solid red;
            background-color: rgb(242, 209, 209);
            padding: 15px;
            width: 470px;
            margin: auto;
        }

        .campo{
            display: flex;
            margin-bottom: 15px;
            align-items: center;
        }

        label{
            width: 100px;
        }

        select,
        textarea{
            background-color: white;
        }

        textarea{
            resize: none;
        }

        button{
            border: 3px solid red;
            padding: 10px;
            background-color: rgb(242, 209, 209);
        }

    </style>

</head>
<body>

    <header>
        <p>Pedido de Apoio ao Helpdesk</p>
    </header>

    <main>

        <section>

            <form>

                <div class="campo">
                    <label for="categoria">Categoria:</label>

                    <select id="categoria">
                        <option>Hardware</option>
                        <option>Software</option>
                        <option>Rede</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="prioridade">Prioridade:</label>

                    <select id="prioridade">
                        <option>Baixa</option>
                        <option>Média</option>
                        <option>Alta</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="descricao">Descrição:</label>

                    <textarea id="descricao" rows="5" cols="35"></textarea>
                </div>

                <button type="submit">Enviar</button>

            </form>

        </section>

    </main>

</body>
</html>
